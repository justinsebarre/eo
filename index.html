<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CDM Shop Pro - Hacker Edition (Official Final)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* --- BASE STYLES --- */
*{box-sizing:border-box;margin:0;padding:0;}

body {
    font-family:'Poppins',sans-serif;
    /* Pattern style background para hindi stretched ang logo */
    background: linear-gradient(rgba(30, 60, 114, 0.85), rgba(42, 82, 152, 0.85)), 
                url('file:///C:c.png');
    background-size: 250px; 
    background-repeat: repeat;
    background-attachment: fixed;
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
    transition: 0.4s;
    animation: moveBackground 40s linear infinite;
}

@keyframes moveBackground {
    from { background-position: 0 0; }
    to { background-position: 1000px 1000px; }
}

/* --- SCANNING EFFECTS --- */
#scanRadar {
    position: fixed; top: 0; left: 0; width: 100%; height: 5px;
    background: rgba(0, 255, 65, 0.5);
    box-shadow: 0 0 20px #00ff41;
    z-index: 9999; display: none;
    animation: radarMove 1.5s infinite;
}
@keyframes radarMove {
    0% { top: 0%; opacity: 0; }
    50% { opacity: 1; }
    100% { top: 100%; opacity: 0; }
}

.shake-effect { animation: shake 0.2s ease-in-out infinite; }
@keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(3px,3px); }
    75% { transform: translate(-3px,-3px); }
}

/* --- HACKER MODE CSS --- */
body.dark {
    background: linear-gradient(rgba(0, 0, 0, 0.92), rgba(0, 21, 0, 0.92)), 
                url('file:///C:c.png');
    background-size: 250px;
    color: #00ff41; 
    font-family: 'Fira Code', monospace;
}
body.dark .card { background: rgba(10, 10, 10, 0.98); border: 2px solid #00ff41; box-shadow: 0 0 30px rgba(0, 255, 65, 0.3); }

/* --- CARD DESIGN --- */
.card{
    background: rgba(255, 255, 255, 0.95); 
    backdrop-filter: blur(15px);
    width:95%; max-width:750px; padding:35px; border-radius:25px;
    box-shadow:0 25px 60px rgba(0,0,0,0.4); 
    position: relative; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.3);
    z-index: 10;
}

/* --- UI ELEMENTS --- */
.scrolling-text { background: #f1f4f9; color: #1e3c72; padding: 10px 0; font-size: 14px; font-weight: 700; margin-bottom: 20px; border-radius: 10px; overflow: hidden; white-space: nowrap; position: relative; }
body.dark .scrolling-text { background: #001500; color: #00ff41; border: 1px solid #00ff41; }
.marquee-inner { display: inline-block; padding-left: 100%; animation: marquee-run 20s linear infinite; }
@keyframes marquee-run { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

input, select, button:not(.theme-toggle) { padding: 12px; border-radius: 10px; border: 1px solid #ccc; width: 100%; margin-bottom: 10px; font-family: inherit; }
.primary { background: #1e3c72; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; text-decoration: none; display: flex; align-items: center; justify-content: center; }
.success { background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; }
.danger { background: #dc3545; color: white; border: none; font-weight: bold; cursor: pointer; }
body.dark .primary { background: transparent; border: 1px solid #00ff41; color: #00ff41; }

.forgot-btn { display: block; text-align: right; font-size: 12px; color: #1e3c72; text-decoration: underline; margin-bottom: 10px; cursor: pointer; font-weight: 600; }
body.dark .forgot-btn { color: #00ff41; }

.theme-toggle { position: fixed; top: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; border: none; background: white; cursor: pointer; font-size: 24px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

/* --- GRID & TABLES --- */
.grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:20px; margin-top: 10px;}
.platform-card { background:#f8f9fa; border-radius:18px; padding:20px; text-align:center; border: 1px solid #ddd; animation: waveFloating 3s ease-in-out infinite; position: relative;}
body.dark .platform-card { background: #000; border: 1px solid #333; }
@keyframes waveFloating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }
.best-deal-tag { position: absolute; top: 5px; right: 5px; background: #ffc107; color: #000; font-size: 9px; font-weight: bold; padding: 2px 6px; border-radius: 4px; }

table{ width:100%; border-collapse:collapse; background:white; border-radius:12px; overflow:hidden; margin-top: 20px;}
body.dark table { background: #000; color: #00ff41; border: 1px solid #00ff41; }
table thead tr{ background: #1e3c72; color: white; }
tr.highlight td { background: rgba(40, 167, 69, 0.2) !important; font-weight: bold; }

.hidden{ display: none; }
.hacker-terminal { background: #000; color: #00ff41; padding: 10px; border-radius: 8px; font-size: 10px; height: 80px; overflow-y: auto; margin: 10px 0; border: 1px solid #333; display: none; font-family: 'Fira Code', monospace; }
</style>
</head>
<body>

<div id="scanRadar"></div>
<button class="theme-toggle" onclick="toggleDark()">🌙</button>

<div class="card" id="mainCard">
    <div style="text-align: center; margin-bottom: 10px;">
        <img src="file:///C:/Users/DESKTOP/Pictures/c.png" style="width: 80px; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));" alt="Logo" onerror="this.src='https://via.placeholder.com/80?text=CDM'">
        <h2 style="margin-top:5px; letter-spacing: 1px;">CDM SHOP PRO</h2>
    </div>

    <div class="scrolling-text">
        <div class="marquee-inner">• SYSTEM ENCRYPTED • SCANNING FOR DEALS • API BYPASS ACTIVE • ACCURATE PRICING CORE •</div>
    </div>

    <div id="authSection">
        <select id="loginRole">
            <option value="user">Standard User / Buyer</option>
            <option value="admin">System Administrator</option>
        </select>
        <input type="text" id="authUser" placeholder="Username">
        <input type="password" id="authPass" placeholder="Password">
        <span class="forgot-btn" onclick="forgotPassword()">Forgot Password?</span>
        <button class="primary" onclick="login()">LOGIN TO SYSTEM</button>
        <hr style="margin: 20px 0; border: 0.5px solid #ccc; opacity: 0.2;">
        <div id="registerBox">
            <input type="text" id="regUser" placeholder="New Username">
            <input type="password" id="regPass" placeholder="New Password">
            <button class="success" onclick="registerUser()">CREATE ACCOUNT</button>
        </div>
    </div>

    <div id="buyerSection" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 id="welcomeMsg" style="font-size: 14px;"></h3>
            <span id="roleBadge" style="padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; color: white; background: #1e3c72;"></span>
        </div>
        
        <div style="display:flex; gap:10px; margin-top: 15px;">
            <input type="text" id="searchInput" placeholder="Search (iphone, laptop, nike, watch...)">
            <button class="primary" style="width: 120px;" onclick="triggerScan()">SCAN</button>
        </div>

        <div id="hackerLog" class="hacker-terminal"></div>
        <div id="shopGrid" class="grid"></div>

        <div id="priceTable" class="hidden">
            <table>
                <thead>
                    <tr><th>MARKETPLACE</th><th style="text-align:right;">PRICE (₱)</th><th style="text-align:center;">LINK</th></tr>
                </thead>
                <tbody id="priceBody"></tbody>
            </table>
        </div>

        <button class="danger" onclick="logout()" style="margin-top: 20px;">DISCONNECT SESSION</button>
    </div>

    <footer style="text-align:center; font-size:10px; margin-top:20px; opacity:0.6;">© 2026 CDM AI SMART SHOP • DATABASE PROTECTED</footer>
</div>

<script>
// DATABASE NG ACCURATE PRICING
const priceReference = {
    "iphone": 55990, "laptop": 32500, "bag": 850, "cable": 150, 
    "phone": 12000, "watch": 2500, "nike": 4500, "monitor": 8900, "macbook": 64990, "ipad": 21000
};

const shops = [
    {name:"Shopee", url:"https://shopee.ph/search?keyword=", img:"https://upload.wikimedia.org/wikipedia/commons/f/fe/Shopee.svg"},
    {name:"Lazada", url:"https://www.lazada.com.ph/catalog/?q=", img:"https://tse2.mm.bing.net/th/id/OIP.N9nx3NN4r6O-Akbk-E9KSQAAAA?pid=Api&h=220&P=0"},
    {name:"TikTok", url:"https://www.tiktok.com/search?q=", img:"https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg"}
];

let users = JSON.parse(localStorage.getItem("users")) || [
    {username:"admin", password:"123", role:"admin"},
    {username:"user", password:"123", role:"user"}
];

function toggleDark() { document.body.classList.toggle("dark"); }

function forgotPassword() {
    let u = prompt("Enter your username:");
    if(!u) return;
    let found = users.find(x => x.username === u.trim());
    if(found) alert("ID FOUND!\nPassword: " + found.password);
    else alert("Username not found.");
}

function logToTerminal(msg) {
    const log = document.getElementById("hackerLog");
    log.style.display = "block";
    log.innerHTML += `> ${msg}<br>`;
    log.scrollTop = log.scrollHeight;
}

function triggerScan() {
    let term = document.getElementById("searchInput").value.trim().toLowerCase();
    if(!term) return alert("Please enter a product name.");

    document.getElementById("scanRadar").style.display = "block";
    document.getElementById("mainCard").classList.add("shake-effect");
    document.getElementById("shopGrid").innerHTML = "";
    document.getElementById("priceTable").classList.add("hidden");
    
    logToTerminal(`Analyzing market price for "${term}"...`);

    setTimeout(() => {
        document.getElementById("scanRadar").style.display = "none";
        document.getElementById("mainCard").classList.remove("shake-effect");
        renderResults(term);
        logToTerminal(`Deep scan complete. Sources verified.`);
    }, 1500);
}

function renderResults(term) {
    const grid = document.getElementById("shopGrid");
    const body = document.getElementById("priceBody");
    
    let basePrice = 500; 
    for (let key in priceReference) {
        if (term.includes(key)) { basePrice = priceReference[key]; break; }
    }

    let results = shops.map(s => {
        let variation = (Math.random() * 0.1 - 0.05) * basePrice;
        return {
            name: s.name,
            price: parseFloat((basePrice + variation).toFixed(2)),
            url: s.url + encodeURIComponent(term),
            img: s.img
        };
    });

    let minPrice = Math.min(...results.map(r => r.price));

    // GRID RENDERING
    grid.innerHTML = results.map(r => `
        <div class="platform-card">
            ${r.price === minPrice ? '<span class="best-deal-tag">BEST PRICE</span>' : ''}
            <img src="${r.img}" style="height:35px; margin-bottom:10px;">
            <p style="font-size:11px; font-weight:bold;">${term.toUpperCase()}</p>
            <p style="color:#28a745; font-weight:bold; margin-bottom:10px;">₱${r.price.toLocaleString()}</p>
            <a href="${r.url}" target="_blank" class="primary" style="font-size:10px; padding:8px; border-radius:8px;">VISIT STORE</a>
        </div>`).join("");

    // TABLE RENDERING
    body.innerHTML = results.map(r => `
        <tr class="${r.price === minPrice ? 'highlight' : ''}">
            <td>${r.name} ${r.price === minPrice ? '⭐' : ''}</td>
            <td style="text-align:right;">₱${r.price.toLocaleString()}</td>
            <td style="text-align:center;"><a href="${r.url}" target="_blank" style="color:inherit; font-weight:bold;">Link</a></td>
        </tr>`).join("");

    document.getElementById("priceTable").classList.remove("hidden");
}

function login() {
    let u = document.getElementById("authUser").value.trim();
    let p = document.getElementById("authPass").value.trim();
    let rSelect = document.getElementById("loginRole").value;
    let found = users.find(x => x.username === u && x.password === p);
    if(found) {
        if(rSelect === "admin" && found.role !== "admin") return alert("Admin access denied.");
        sessionStorage.setItem("activeUser", u);
        sessionStorage.setItem("userRole", found.role);
        location.reload();
    } else alert("Access Denied.");
}

function registerUser() {
    let u = document.getElementById("regUser").value.trim();
    let p = document.getElementById("regPass").value.trim();
    if(!u || !p) return alert("Fields cannot be empty.");
    users.push({username:u, password:p, role:"user"});
    localStorage.setItem("users", JSON.stringify(users));
    alert("Identity Initialized.");
}

function logout() { sessionStorage.clear(); location.reload(); }

window.onload = () => {
    let active = sessionStorage.getItem("activeUser");
    let role = sessionStorage.getItem("userRole");
    if(active) {
        document.getElementById("authSection").classList.add("hidden");
        document.getElementById("buyerSection").classList.remove("hidden");
        document.getElementById("welcomeMsg").innerText = `LOGGED IN: ${active.toUpperCase()}`;
        document.getElementById("roleBadge").innerText = role.toUpperCase();
        if(role === "admin") document.getElementById("roleBadge").style.background = "#dc3545";
    }
}
</script>
</body>
</html>
